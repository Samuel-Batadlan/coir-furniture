[variables]
PHP_VERSION = "8.4"

[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.fileinfo", "php84Extensions.openssl", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.gd", "composer", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
    "composer install --optimize-autoloader --no-dev --no-interaction --ignore-platform-reqs",
    "npm ci --legacy-peer-deps",
    "npm run build"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"